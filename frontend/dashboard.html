<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Team Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Team Task Manager</div>
    <div class="nav-menu">
      <a href="dashboard.html" class="nav-link active">Dashboard</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="tasks.html" class="nav-link">Tasks</a>
      <div class="user-info">
        <span id="userName">User</span>
        <span id="userRole" class="badge">Role</span>
        <button onclick="logout()" class="btn btn-small">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1>Dashboard</h1>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Tasks</h3>
        <p class="stat-number" id="totalTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>To Do</h3>
        <p class="stat-number" id="todoTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>In Progress</h3>
        <p class="stat-number" id="inProgressTasks">0</p>
      </div>
      <div class="stat-card">
        <h3>Completed</h3>
        <p class="stat-number" id="completedTasks">0</p>
      </div>
      <div class="stat-card stat-overdue">
        <h3>Overdue</h3>
        <p class="stat-number" id="overdueTasks">0</p>
      </div>
    </div>

    <!-- Overdue Tasks Section -->
    <div class="section" id="overdueSection" style="display: none;">
      <h2>Overdue Tasks</h2>
      <div id="overdueTasksList" class="task-list"></div>
    </div>

    <!-- My Tasks Section -->
    <div class="section">
      <h2>My Recent Tasks</h2>
      <div id="myTasksList" class="task-list"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
