<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks - Team Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Team Task Manager</div>
    <div class="nav-menu">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="projects.html" class="nav-link">Projects</a>
      <a href="tasks.html" class="nav-link active">Tasks</a>
      <div class="user-info">
        <span id="userName">User</span>
        <span id="userRole" class="badge">Role</span>
        <button onclick="logout()" class="btn btn-small">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Tasks</h1>
      <button id="createTaskBtn" class="btn btn-primary">+ Create Task</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <select id="projectFilter" class="filter-select">
        <option value="">All Projects</option>
      </select>
      <select id="statusFilter" class="filter-select">
        <option value="">All Status</option>
        <option value="To Do">To Do</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
      <button onclick="loadTasks()" class="btn btn-secondary">Apply Filters</button>
    </div>

    <div id="tasksList" class="tasks-grid"></div>
  </div>

  <!-- Create/Edit Task Modal -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle">Create Task</h2>

      <form id="taskForm">
        <input type="hidden" id="taskId">

        <div class="form-group">
          <label for="taskTitle">Task Title *</label>
          <input type="text" id="taskTitle" required minlength="3">
        </div>

        <div class="form-group">
          <label for="taskDescription">Description *</label>
          <textarea id="taskDescription" rows="4" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskProject">Project *</label>
            <select id="taskProject" required>
              <option value="">Select Project</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskAssignedTo">Assign To</label>
            <select id="taskAssignedTo">
              <option value="">Unassigned</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="taskStatus">Status</label>
            <select id="taskStatus">
              <option value="To Do">To Do</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="taskDueDate">Due Date *</label>
          <input type="date" id="taskDueDate" required>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="tasks.js"></script>
</body>
</html>
